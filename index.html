<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fuga · A2 第1单元 练习</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #e8edf2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .phone-frame {
            width: 390px;
            max-width: 100%;
            background: #f4f9f7;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 844px;
            max-height: 100vh;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }

        .pages-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px 20px 20px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .pages-container::-webkit-scrollbar {
            width: 0;
            display: none;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 4px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            letter-spacing: -0.3px;
        }
        .page-header h1 span {
            color: #4a9e8e;
        }
        .page-header .sub {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: 400;
            background: #eef2f6;
            padding: 4px 14px;
            border-radius: 20px;
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .mode-tab {
            flex: 1;
            min-width: 70px;
            padding: 10px 0;
            border: 2px solid #d5dce4;
            border-radius: 30px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
        }
        .mode-tab.active {
            background: #4a9e8e;
            border-color: #4a9e8e;
            color: #fff;
            box-shadow: 0 4px 12px rgba(74, 158, 142, 0.25);
        }
        .mode-tab i {
            margin-right: 4px;
        }

        .sub-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            padding: 0 4px;
        }
        .sub-tab {
            padding: 6px 16px;
            border: 2px solid #d5dce4;
            border-radius: 20px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
        }
        .sub-tab.active {
            background: #4a9e8e;
            border-color: #4a9e8e;
            color: #fff;

        }
        .card-counter strong {

            background: #ffffff;
            border-radius: 32px;

            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(200, 212, 220, 0.25);
            min-height: 240px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chinese-prompt {
            font-size: 24px;
            font-weight: 700;

        .chinese-prompt.center {

            border-radius: 30px;

            font-family: inherit;

        .input-row input::placeholder {

            display: flex;
            gap: 8px;
            flex-wrap: wrap;

            min-width: 0;

            border: none;

            font-weight: 600;

        .btn-check:active {

        }
        .btn-reveal {
            background: #e8f0ee;
            color: #4a9e8e;
        }
        .btn-reveal:active {
            background: #d5e0dc;
        }
        .btn-prev {
            background: #eef2f6;
            color: #2c3e50;
        }
        .btn-prev:active {
            background: #dce4ec;
        }
        .btn-prev:disabled {
            opacity: 0.35;
            pointer-events: none;
        }
        .btn-next {
            background: #eef2f6;
            color: #2c3e50;
        }
        .btn-next:active {
            background: #dce4ec;
        }

        .result-box {
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 20px;
            background: #f8fafc;
            border: 1px solid #e2eaf2;
            min-height: 60px;
            font-size: 18px;

            display: flex;

        .result-box .correct-answer {

            background: #e3f3ec;

        .result-box .wrong-highlight {
            background: #ffd9d9;

            font-weight: 700;

        }
        .result-box .user-input-text {
            color: #2c3e50;

            letter-spacing: 0.5px;
        }
        .result-box .answer-label {
            color: #7f8c8d;

        }
        .result-box .missing-char {
            background: #ffd9d9;

            padding: 1px 4px;

        .missing-placeholder {
            display: inline-block;

        .bottom-meta {

        .footer-copyright {

    </style>

<div class="phone-frame">

            </div>

                <button class="btn-check" id="checkBtn"><i class="fas fa-check"></i> 检查</button>

</div>

<script>
    // ============================================================
    // 辅助函数
    // ============================================================
    function formatChinese(text) {
        return text.replace(/（[^）]*）/g, function(match) {
            return `<span class="hint">${match}</span>`;
        });
    }

    function stripAccents(str) {
        const accentMap = {
            'à': 'a', 'á': 'a', 'â': 'a', 'ä': 'a',
            'è': 'e', 'é': 'e', 'ê': 'e', 'ë': 'e',
            'ì': 'i', 'í': 'i', 'î': 'i', 'ï': 'i',
            'ò': 'o', 'ó': 'o', 'ô': 'o', 'ö': 'o',
            'ù': 'u', 'ú': 'u', 'û': 'u', 'ü': 'u',
            'À': 'A', 'Á': 'A', 'Â': 'A', 'Ä': 'A',
            'È': 'E', 'É': 'E', 'Ê': 'E', 'Ë': 'E',
            'Ì': 'I', 'Í': 'I', 'Î': 'I', 'Ï': 'I',
            'Ò': 'O', 'Ó': 'O', 'Ô': 'O', 'Ö': 'O',
            'Ù': 'U', 'Ú': 'U', 'Û': 'U', 'Ü': 'U'
        };
        return str.split('').map(ch => accentMap[ch] || ch).join('');
    }

    function isSubjectPronoun(word) {
        const pronouns = ['io', 'tu', 'lui', 'lei', 'noi', 'voi', 'loro', 'Lei'];
        return pronouns.includes(word.toLowerCase());
    }

    function removeSubjectPronouns(input) {
        const words = input.split(/\s+/);
        const filtered = words.filter(word => !isSubjectPronoun(word));
        return filtered.join(' ');
    }

    function isLetterOrDigit(ch) {
        return /[a-zA-Z0-9]/.test(ch);
    }

    function normalizeForCompare(str) {
        return stripAccents(str).toLowerCase().split('').filter(ch => isLetterOrDigit(ch)).join('');
    }

    // ============================================================
    // 标色算法：缺什么空什么，错误标红（修复版）
    // ============================================================
    function highlightDiff(userInput, correctAnswer) {
        // 1. 去掉主语人称代词
        const userCleaned = removeSubjectPronouns(userInput);
        const correctCleaned = removeSubjectPronouns(correctAnswer);

        // 2. 如果用户输入为空
        if (userInput.trim() === '') {
            return {
                html: `<span class="user-input-text">（未输入）</span>`,
                isCorrect: false
            };
        }

        // 3. 检查是否完全匹配（忽略重音和大小写，但保留原始字符比较）
        const userNorm = normalizeForCompare(userCleaned);
        const correctNorm = normalizeForCompare(correctCleaned);
        if (userNorm === correctNorm) {
            return {
                html: `<span class="full-correct">✅ ${correctAnswer}</span>`,
                isCorrect: true
            };
        }

        const uChars = userCleaned.split('');
        const cChars = correctCleaned.split('');

        let output = '';
        let isCorrect = true;
        let uIdx = 0, cIdx = 0;

        while (uIdx < uChars.length || cIdx < cChars.length) {
            // 如果用户字符已用完
            if (uIdx >= uChars.length) {
                const missing = cChars[cIdx];
                if (missing === ' ') {
                    output += `<span class="missing-space"></span>`;
                } else {
                    output += `<span class="missing-placeholder"></span>`;
                }
                cIdx++;
                isCorrect = false;
                continue;
            }

            // 如果正确答案字符已用完
            if (cIdx >= cChars.length) {
                output += `<span class="wrong-highlight">${uChars[uIdx]}</span>`;
                uIdx++;
                isCorrect = false;
                continue;
            }

            const uNorm = stripAccents(uChars[uIdx]).toLowerCase();
            const cNorm = stripAccents(cChars[cIdx]).toLowerCase();

            if (uNorm === cNorm) {
                output += uChars[uIdx];
                uIdx++;
                cIdx++;
            } else {
                // 向前看：用户当前字符是否匹配正确答案后面的某个字符（用户漏掉了中间字符）
                let found = false;
                let lookAhead = 1;
                while (cIdx + lookAhead < cChars.length && lookAhead <= 8) {
                    const futureCNorm = stripAccents(cChars[cIdx + lookAhead]).toLowerCase();
                    if (futureCNorm === uNorm) {
                        // 用户漏掉了中间字符
                        for (let k = 0; k < lookAhead; k++) {
                            const missing = cChars[cIdx + k];
                            if (missing === ' ') {
                                output += `<span class="missing-space"></span>`;
                            } else {
                                output += `<span class="missing-placeholder"></span>`;
                            }
                        }
                        cIdx += lookAhead;
                        output += uChars[uIdx];
                        uIdx++;
                        cIdx++;
                        found = true;
                        isCorrect = false;
                        break;
                    }
                    lookAhead++;
                }

                if (!found) {
                    // 检查正确答案当前字符是否匹配用户后面的某个字符（用户多打了字符）
                    let foundInUser = false;
                    let lookAheadU = 1;
                    while (uIdx + lookAheadU < uChars.length && lookAheadU <= 8) {
                        const futureUNorm = stripAccents(uChars[uIdx + lookAheadU]).toLowerCase();
                        if (futureUNorm === cNorm) {
                            // 用户多了字符
                            for (let k = 0; k < lookAheadU; k++) {
                                output += `<span class="wrong-highlight">${uChars[uIdx + k]}</span>`;
                            }
                            uIdx += lookAheadU;
                            output += uChars[uIdx];
                            uIdx++;
                            cIdx++;
                            foundInUser = true;
                            isCorrect = false;
                            break;
                        }
                        lookAheadU++;
                    }

                    if (!foundInUser) {
                        // 真正不匹配
                        output += `<span class="wrong-highlight">${uChars[uIdx]}</span>`;
                        uIdx++;
                        if (cIdx < cChars.length) {
                            const missing = cChars[cIdx];
                            if (missing === ' ') {
                                output += `<span class="missing-space"></span>`;
                            } else {
                                output += `<span class="missing-placeholder"></span>`;
                            }
                            cIdx++;
                        }
                        isCorrect = false;
                    }
                }
            }
        }

        return {
            html: `<span class="user-input-text">${output}</span> <span class="answer-label">→ 正确:</span> <span class="correct-answer">${correctAnswer}</span>`,
            isCorrect: isCorrect
        };
    }

    // ============================================================
    // 数据 —— A2 第1单元（已按你的要求修改）
    // ============================================================
    const SECTIONS = [
        {

                { chinese: '他们（过去）说话', italian: 'parlavano' },

                { chinese: '我（过去）生活', italian: 'vivevo' },
                { chinese: '你（过去）生活', italian: 'vivevi' },
                { chinese: '他/她/您（过去）生活', italian: 'viveva' },
                { chinese: '我们（过去）生活', italian: 'vivevamo' },
                { chinese: '你们（过去）生活', italian: 'vivevate' },
                { chinese: '他们（过去）生活', italian: 'vivevano' },
                { chinese: '睡觉（原形）', italian: 'dormire' },
                { chinese: '我（过去）睡觉', italian: 'dormivo' },
                { chinese: '你（过去）睡觉', italian: 'dormivi' },
                { chinese: '他/她/您（过去）睡觉', italian: 'dormiva' },
                { chinese: '我们（过去）睡觉', italian: 'dormivamo' },
                { chinese: '你们（过去）睡觉', italian: 'dormivate' },
                { chinese: '他们（过去）睡觉', italian: 'dormivano' },
                { chinese: '是（原形）', italian: 'essere' },
                { chinese: '我（过去）是', italian: 'ero' },
                { chinese: '你（过去）是', italian: 'eri' },
                { chinese: '他/她/您（过去）是', italian: 'era' },
                { chinese: '我们（过去）是', italian: 'eravamo' },
                { chinese: '你们（过去）是', italian: 'eravate' },

    // ============================================================
    // 状态
    // ============================================================
    let currentSection = 0;
    let currentIndex = 0;
    let currentSubIndex = 0;
    let currentPairs = [];
    let learnedSet = new Set();

    const chinesePrompt = document.getElementById('chinesePrompt');
    const userInput = document.getElementById('userInput');
    const checkBtn = document.getElementById('checkBtn');
    const revealBtn = document.getElementById('revealBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resultBox = document.getElementById('resultBox');
    const currentNum = document.getElementById('currentNum');
    const totalNum = document.getElementById('totalNum');
    const learnedCount = document.getElementById('learnedCount');
    const progressText = document.getElementById('progressText');
    const tabBtns = document.querySelectorAll('.mode-tab');
    const subTabs = document.getElementById('subTabs');

    function getCurrentPairs() {
        const section = SECTIONS[currentSection];
        if (section.subSections) {
            return section.subSections[currentSubIndex].pairs;
        }
        return section.pairs;
    }

    function getCurrentAlign() {
        const section = SECTIONS[currentSection];
        if (section.subSections) {
            return section.subSections[currentSubIndex].pairs.length > 0 ? 'left' : 'center';
        }
        return section.align;
    }

    // ============================================================
    // 渲染
    // ============================================================
    function renderCard() {
        currentPairs = getCurrentPairs();
        const pair = currentPairs[currentIndex] || { chinese: '（暂无题目）', italian: '' };
        const section = SECTIONS[currentSection];
        const align = getCurrentAlign();

        if (align === 'center') {
            chinesePrompt.classList.add('center');
        } else {
            chinesePrompt.classList.remove('center');
        }

        if (section.subSections && currentPairs.length === 0) {
            chinesePrompt.innerHTML = '📝 内容准备中...';
        } else {
            chinesePrompt.innerHTML = formatChinese(pair.chinese);
        }

        userInput.value = '';
        resultBox.innerHTML = `<span class="hint-empty">✏️ 输入后点击「检查」</span>`;
        currentNum.textContent = currentPairs.length > 0 ? currentIndex + 1 : 0;
        totalNum.textContent = currentPairs.length;
        learnedCount.textContent = learnedSet.size;
        const progress = currentPairs.length ? Math.round((learnedSet.size / currentPairs.length) * 100) : 0;
        progressText.textContent = progress + '%';
        prevBtn.disabled = (currentIndex === 0 || currentPairs.length === 0);
        userInput.focus();
    }

    // ============================================================
    // 操作
    // ============================================================
    function checkAnswer() {
        const pair = currentPairs[currentIndex];
        if (!pair) {
            resultBox.innerHTML = `<span style="color:#b33c3c;">⚠️ 暂无题目</span>`;
            return;
        }
        const userAns = userInput.value;
        if (userAns.trim() === '') {
            resultBox.innerHTML = `<span style="color:#b33c3c;">⚠️ 请先输入意大利语</span>`;
            return;
        }
        const { html, isCorrect } = highlightDiff(userAns, pair.italian);
        resultBox.innerHTML = html;
        if (isCorrect) {
            const key = currentIndex + '-' + pair.italian + '-' + currentSection + '-' + currentSubIndex;
            learnedSet.add(key);
            learnedCount.textContent = learnedSet.size;
            const progress = currentPairs.length ? Math.round((learnedSet.size / currentPairs.length) * 100) : 0;
            progressText.textContent = progress + '%';
        } else {
            userInput.focus();
            userInput.select();
        }
    }

    function revealAnswer() {
        const pair = currentPairs[currentIndex];
        if (!pair) {
            resultBox.innerHTML = `<span style="color:#b33c3c;">⚠️ 暂无题目</span>`;
            return;
        }
        resultBox.innerHTML = `<span class="answer-label">🔍 正确答案:</span> <span class="correct-answer">${pair.italian}</span>`;
    }

    function prevCard() {
        if (currentPairs.length === 0) return;
        if (currentIndex > 0) { currentIndex--; renderCard(); }
    }

    function nextCard() {
        if (currentPairs.length === 0) {
            renderCard();
            return;
        }
        if (currentIndex < currentPairs.length - 1) { currentIndex++; }
        else { currentIndex = 0; }
        renderCard();
    }

    function renderSubTabs() {
        const section = SECTIONS[currentSection];
        subTabs.innerHTML = '';
        if (section.subSections) {
            subTabs.style.display = 'flex';
            section.subSections.forEach((sub, idx) => {
                const btn = document.createElement('button');
                btn.className = 'sub-tab' + (idx === currentSubIndex ? ' active' : '');
                btn.textContent = sub.name;
                btn.dataset.sub = idx;
                btn.addEventListener('click', function() {
                    switchSubTab(parseInt(this.dataset.sub));
                });
                subTabs.appendChild(btn);
            });
        } else {
            subTabs.style.display = 'none';
        }
    }

    function switchSection(sectionIdx) {
        if (sectionIdx === currentSection) return;
        currentSection = sectionIdx;
        currentIndex = 0;
        currentSubIndex = 0;
        learnedSet = new Set();

        tabBtns.forEach((btn, idx) => btn.classList.toggle('active', idx === sectionIdx));

        renderSubTabs();
        currentPairs = getCurrentPairs();
        renderCard();
        userInput.focus();
    }

    function switchSubTab(subIdx) {
        if (subIdx === currentSubIndex) return;
        currentSubIndex = subIdx;
        currentIndex = 0;
        learnedSet = new Set();

        const subBtns = subTabs.querySelectorAll('.sub-tab');
        subBtns.forEach((btn, idx) => btn.classList.toggle('active', idx === subIdx));

        currentPairs = getCurrentPairs();
        renderCard();
        userInput.focus();
    }

    // ============================================================
    // 初始化
    // ============================================================
    function init() {
        tabBtns.forEach((btn, idx) => {
            btn.addEventListener('click', function() { switchSection(idx); });
        });

        checkBtn.addEventListener('click', checkAnswer);
        revealBtn.addEventListener('click', revealAnswer);
        prevBtn.addEventListener('click', prevCard);
        nextBtn.addEventListener('click', nextCard);

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); checkAnswer(); }
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); revealAnswer(); }
            if (e.ctrlKey && e.key === 'ArrowRight') { e.preventDefault(); nextCard(); }
            if (e.ctrlKey && e.key === 'ArrowLeft') { e.preventDefault(); prevCard(); }
        });

        currentSection = 0;
        currentSubIndex = 0;
        renderSubTabs();
        subTabs.style.display = 'none';
        currentPairs = SECTIONS[0].pairs;
        renderCard();
        console.log(`✅ Fuga A2 第1单元 · 已加载`);
    }
    init();
</script>
